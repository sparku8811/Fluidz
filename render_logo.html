<!DOCTYPE html>
<html>
<body style="margin:0; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <!-- This SVG is scaled to exactly 1080x1080 for your Store Logo -->
    <div id="capture" style="width: 1080px; height: 1080px; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 200 200">
            <!-- Stylized Drop Shape (Deep Blue) -->
            <path fill="#003366" d="M100,20 C100,20 175,100 175,145 A75,75 0 1,1 25,145 C25,100 100,20 100,20 Z" />

            <!-- Minimalist 'Z' (White) -->
            <path fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
                  d="M75,115 L125,115 L75,155 L125,155" />

            <!-- Accent Highlight (Sky Blue) -->
            <path fill="#64B5F6" d="M140,80 C145,95 140,110 130,120 C135,110 135,95 130,85 Z" />
        </svg>
    </div>
    <div style="position: fixed; top: 20px; left: 20px; background: white; padding: 20px; border-radius: 10px; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="margin-top:0;">Fluidz Logo Renderer</h2>
        <p>1. Right-click the logo to the right.</p>
        <p>2. Select <b>"Save image as..."</b></p>
        <p>3. Upload the PNG to the Microsoft Store.</p>
    </div>
</body>
</html>
