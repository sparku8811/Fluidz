<!DOCTYPE html>
<html lang="en">
<body style="margin:0; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 120vh;">
    <!-- This SVG is scaled to exactly 720x1080 for your Store Poster -->
    <div style="width: 720px; height: 1080px; background: #003366; position: relative; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

        <!-- Decorative Background Gradient -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 30%, #004488 0%, #003366 70%);"></div>

        <!-- Central Logo -->
        <div style="position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px;">
            <svg viewBox="0 0 200 200" width="400" height="400">
                <path fill="#004a8d" d="M100,20 C100,20 175,100 175,145 A75,75 0 1,1 25,145 C25,100 100,20 100,20 Z" opacity="0.5" />
                <path fill="#ffffff" d="M100,20 C100,20 175,100 175,145 A75,75 0 1,1 25,145 C25,100 100,20 100,20 Z" transform="scale(0.9) translate(11, 11)" />
                <path fill="#003366" d="M100,20 C100,20 175,100 175,145 A75,75 0 1,1 25,145 C25,100 100,20 100,20 Z" transform="scale(0.85) translate(18, 18)" />
                <path fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" d="M75,115 L125,115 L75,155 L125,155" transform="scale(0.85) translate(18, 18)" />
                <path fill="#64B5F6" d="M140,80 C145,95 140,110 130,120 C135,110 135,95 130,85 Z" transform="scale(0.85) translate(18, 18)" />
            </svg>
        </div>

        <!-- Text Elements -->
        <div style="position: absolute; bottom: 120px; width: 100%; text-align: center; color: white;">
            <h1 style="font-size: 100px; font-weight: 900; margin: 0; letter-spacing: -4px;">FLUIDZ</h1>
            <h2 style="font-size: 32px; font-weight: 700; color: #CC5500; margin-top: -10px; text-transform: uppercase;">Secure Assistant for Veterans</h2>
            <p style="font-size: 20px; font-weight: 500; opacity: 0.8; margin-top: 20px;">Automated Scheduling • Military-Grade Privacy</p>
        </div>

        <!-- Bottom Tagline -->
        <div style="position: absolute; bottom: 40px; width: 100%; text-align: center; color: white; opacity: 0.6; font-size: 14px; letter-spacing: 2px;">
            100% FOR VETERANS • 100% MADE BY VETERANS
        </div>

    </div>

    <div style="position: fixed; top: 20px; left: 20px; background: white; padding: 20px; border-radius: 10px; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="margin-top:0;">Fluidz Poster Renderer</h2>
        <p>1. Right-click the poster to the right.</p>
        <p>2. Select <b>"Save image as..."</b></p>
        <p>3. Upload as the <b>720x1080 Poster</b>.</p>
    </div>
</body>
</html>
